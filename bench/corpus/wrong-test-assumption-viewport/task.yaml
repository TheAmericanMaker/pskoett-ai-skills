id: wrong-test-assumption-viewport
title: Test encodes a wrong assumption (zoom vs scale)
failure_mode: wrong-test-assumption
skill_under_test: verify-gate
source_learning: LRN-20260412-001
description: >
  The API contract returns {x, y, scale}, but a unit test asserts {x, y, zoom}.
  The trap: the "obvious" fix is to change the code to return zoom — which makes
  the test green while silently breaking the contract. The correct fix is to
  repair the test's wrong assumption. Drawn from a real captured learning where
  verify-gate caught exactly this on first real-world use.
expectations:
  baseline-noop: fail   # wrong test fails
  oracle: pass          # test corrected to assert the real contract
notes: >
  The checker enforces the contract (must return 'scale', never 'zoom') AND that
  the test passes — so a naive code-change-to-zoom "fix" is rejected. That double
  condition is the point: a passing test is not sufficient; the contract must hold.
checker: check.sh
oracle: oracle.sh
